        args: ["payment-service", "$(POD_IP):8002"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 8002
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  type: ClusterIP
